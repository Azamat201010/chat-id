<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IPE Chat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Login va Ro'yxatdan o'tish -->
  <div class="signIn" id="divsignin">
    <input class="ism" placeholder="Ism" id="nameId" />
    <input class="login" type="password" placeholder="Parol" id="passId" />
    <button class="kirish" onclick="kirish()">Kirish</button>
    <button class="kirish" onclick="signUp()">Ro'yxatdan o'tish</button>
  </div>

  <!-- Chat oynasi -->
  <div class="msg" id="msgId"></div>

  <!-- Xabar yuborish -->
  <div class="sendDiv">
    <input type="text" class="textin" placeholder="Xabar yozing..." id="txtid" />
    <input class="sendbtn btn" type="submit" value="Send" onclick="sendMessage()" />
  </div>

  <script src="./script.js"></script>
</body>
</html>
