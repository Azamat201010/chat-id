<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IPE Chat</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
       (function() {
           emailjs.init({
             publicKey: "5Q9g91ONPJe-wgV2Q",
           });
       })();
  </script>
</head>
<body>

  <!-- Kirish -->
  <div class="signIn" id="divsignin">
    <input placeholder="Ism" id="nameId" />
    <input type="email" placeholder="Email" id="emailId" />
    <input type="password" placeholder="Parol" id="passId" />
    <button onclick="kirish()">Kirish</button>
    <button onclick="showSignUp()">Ro'yxatdan o'tish</button>
  </div>

  <!-- Ro'yxatdan o'tish -->
  <div class="signIn" id="divsignup" style="display:none; flex-direction:column;" >
    <div id="signupStep1">
      <input placeholder="Yangi ism" id="newNameId" />
      <input type="email" placeholder="Email (@gmail.com)" id="newEmailId" />
      <input type="password" placeholder="Yangi parol" id="newPassId" />
      <button onclick="signUp()">Davom etish</button>
      <button onclick="showSignIn()">Ortga qaytish</button>
    </div>

    <!-- Tasdiqlash -->
    <div id="verifyDiv" style="display:none; flex-direction:column;">
      <input placeholder="Tasdiqlash kodi" id="verifyCode" />
      <button onclick="verifyCode()">Tasdiqlash</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chatDiv" style="display:none; flex-direction:column; align-items:center;">
    <div class="msg" id="msgId"></div>
    <div class="sendDiv">
      <input type="text" placeholder="Xabar" id="txtid" />
      <input type="file" id="fileid" /> <!-- ✅ Fayl yuklash -->
      <input type="submit" value="Send" onclick="sendMessage()" />
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
